<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav>
      <div class="logo">
        <a href="index.html">Magic the Gatherer</a>
      </div>
      <div class="links">
        <a href="random.html">Random Card</a>
        <a href="favorites.html">Favorites</a>
        <a href="syntax.html">Syntax Guide</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </nav>
    <div class="contact" id="contact">
      <h1>Submit Feedback</h1>
      <p class="contact-subtitle">
        Have a suggestion or found a problem? Let us know!
      </p>

      <form class="contact-form" id="contactForm">
        <label for="name">name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">your feedback:</label>
        <textarea
          id="message"
          name="message"
          rows="6"
          placeholder="Describe the issue or share your suggestion..."
          required
        ></textarea>

        <button type="submit">submit</button>
      </form>

      <div
        id="formMessage"
        style="
          display: none;
          margin-top: 20px;
          padding: 15px;
          border-radius: 8px;
        "
      ></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
