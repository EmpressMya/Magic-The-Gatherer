<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav>
      <div class="logo">
        <a href="index.html">Magic the Gatherer</a>
      </div>
      <div class="links">
        <a href="random.html">Random Card</a>
        <a href="favorites.html">Favorites</a>
        <a href="syntax.html">Syntax Guide</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </nav>
    <section class="cards-container"></section>

    <script src="js/index.js"></script>
    <script>
      let allSearchResults = [];
      let currentSearchQuery = "";
      let currentSortBy = "name";

      window.handlePageChange = function (page) {
        displaySearchResults(allSearchResults, page, 12, currentSortBy);
      };

      window.handleSortChange = function (sortBy) {
        currentSortBy = sortBy;
        displaySearchResults(allSearchResults, 1, 12, sortBy);
      };

      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get("query");

      if (query) {
        currentSearchQuery = query;
        document.querySelector(".cards-container").innerHTML =
          '<p style="grid-column: 1 / -1; text-align: center; padding: 40px;">Searching for cards...</p>';

        searchCards(query).then((cards) => {
          allSearchResults = cards;
          if (cards.length === 0) {
            console.warn(`No results for query: "${query}"`);
          }
          displaySearchResults(cards, 1, 12, "name");
        });
      } else {
        document.querySelector(".cards-container").innerHTML =
          '<p style="grid-column: 1 / -1; text-align: center; padding: 40px;">Please enter a search query.</p>';
      }
    </script>
  </body>
</html>
